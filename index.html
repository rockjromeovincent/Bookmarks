<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookmarks · Pro Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affb8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --glow: rgba(124,106,255,0.15);
    --danger: #ff5565;
    --success: #6affb8;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 10% 20%, rgba(124,106,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at 90% 80%, rgba(255,106,158,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }
  .page-nav {
    display: flex;
    gap: 4px;
    padding: 16px 0 0;
  }
  .page-tab {
    background: none;
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-tab:hover { color: var(--text); border-color: var(--accent); }
  .page-tab.active {
    background: var(--surface);
    color: var(--accent);
    border-color: var(--accent);
    border-bottom: 1px solid var(--surface);
  }
  .page-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 14px 14px 14px;
    padding: 40px 32px;
    min-height: 70vh;
  }
  .page-content.page-manage { border-radius: 14px; }
  .page { display: none; }
  .page.active { display: block; }
  .rainbow-banner {
    width: 100%;
    border-radius: 14px;
    border: 1px solid var(--border);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 80px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #0e0c1e 0%, #13102a 40%, #0f1a1a 100%);
  }
  .rb-center { text-align: center; z-index: 2; }
  .rb-headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 4vw, 28px);
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stats-bar { display: flex; gap: 16px; margin: 20px 0 24px; flex-wrap: wrap; }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 18px;
    display: flex;
    gap: 10px;
  }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 20px 0; }
  .filter-btn, .manage-cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover, .manage-cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; margin-top: 12px; }
  .bookmark-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }
  .bookmark-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .favicon { width: 28px; height: 28px; border-radius: 7px; background: var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .favicon img { width: 100%; height: 100%; object-fit: contain; border-radius: 5px; }
  .card-info { flex: 1; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6a58e0; }
  .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: rgba(255,85,101,0.15); border: 1px solid rgba(255,85,101,0.3); color: var(--danger); }
  .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

  /* Manage Table */
  .manage-section { margin-bottom: 36px; }
  .manage-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    padding: 12px 16px;
  }
  .bookmark-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }
  .bookmark-table th {
    background: rgba(42,42,58,0.5);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
  }
  .bookmark-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    font-size: 0.85rem;
  }
  .bookmark-table tr:last-child td { border-bottom: none; }
  .empty-cat {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 28px;
    text-align: center;
    color: var(--muted);
  }
  .modal-overlay, .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open, .confirm-overlay.open { opacity: 1; pointer-events: all; }
  .modal, .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
  }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 2000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 4px solid var(--success); }
  .toast.error { border-left: 4px solid var(--danger); }
  @media (max-width: 640px) {
    .page-content { padding: 20px 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-nav">
    <button class="page-tab active" id="tabViewBtn">📚 View Bookmarks</button>
    <button class="page-tab" id="tabManageBtn">⚙️ Manage</button>
  </div>

  <!-- VIEW PAGE -->
  <div class="page-content" id="viewPageContent">
    <div class="rainbow-banner">
      <div class="rb-center">
        <div class="rb-headline">✦ My Bookmarks ✦</div>
        <p style="color:var(--muted); font-size:0.8rem;">All Needed Websites · Edit or delete from Manage</p>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInputView" placeholder="🔍 Search bookmarks..." style="width:100%; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; color:white;" />
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="filter-row" id="filterRowView"></div>
    <div id="bookmarksRootView"></div>
    <div id="noResultsView" style="display:none; text-align:center; padding:60px; color:var(--muted);">✨ No bookmarks match your search</div>
  </div>

  <!-- MANAGE PAGE -->
  <div class="page-content page-manage" id="managePageContent" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom:28px;">
      <div><h2 style="font-family:'Syne'; font-weight:800;">⚙️ Manage <span style="color:var(--accent)">Bookmarks</span></h2><p style="color:var(--muted); font-size:0.8rem;">Add, edit, delete categories & bookmarks</p></div>
      <button class="btn btn-primary" id="globalAddBookmarkBtn">＋ Add Bookmark</button>
    </div>
    <div class="filter-row" id="manageFilterRow"></div>
    <div style="background:var(--card); border:1px dashed var(--border); border-radius:14px; padding:12px 20px; margin-bottom:32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <span style="color:var(--muted);">📁 Need a new category?</span>
      <button class="btn btn-ghost btn-sm" id="globalAddCatBtn">＋ Add Category</button>
    </div>
    <div id="manageRootContainer"></div>
  </div>
</div>

<!-- MODAL: BOOKMARK -->
<div class="modal-overlay" id="bookmarkModal">
  <div class="modal">
    <div class="modal-title" id="bmModalTitle" style="font-family:'Syne'; font-size:1.4rem; font-weight:800; margin-bottom:20px;">Add <span style="color:var(--accent)">Bookmark</span></div>
    <div class="form-group"><label>Name *</label><input type="text" id="bmName" placeholder="e.g., GitHub" /></div>
    <div class="form-group"><label>URL *</label><input type="text" id="bmUrl" placeholder="https://..." /></div>
    <div class="form-group"><label>Category</label><select id="bmCatSelect"></select></div>
    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
      <button class="btn btn-ghost" id="closeBmModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBookmarkBtn">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: CATEGORY -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-title" id="catModalTitle" style="font-family:'Syne'; font-size:1.4rem; font-weight:800; margin-bottom:20px;">Add <span style="color:var(--accent)">Category</span></div>
    <div class="form-group"><label>Category Name</label><input type="text" id="catNameInput" placeholder="e.g., Design" /></div>
    <div class="form-group"><label>Icon (emoji)</label><input type="text" id="catIconInput" placeholder="🎨" maxlength="4" /></div>
    <div class="form-group"><label>Color Class</label><select id="catClassSelect"><option value="cat-ai">Purple (AI)</option><option value="cat-blog">Yellow (Blog)</option><option value="cat-app">Green (App)</option><option value="cat-web">Blue (Web)</option><option value="cat-cs">Pink (CS)</option><option value="cat-taka">Orange (Taka)</option><option value="cat-dev">Violet (Dev)</option><option value="cat-personal">Cyan (Personal)</option></select></div>
    <div style="display:flex; gap:12px; justify-content:flex-end;"><button class="btn btn-ghost" id="closeCatModalBtn">Cancel</button><button class="btn btn-primary" id="saveCatBtn">Save</button></div>
  </div>
</div>

<!-- CONFIRM DELETE DIALOG -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box"><div style="font-size:2rem;">🗑️</div><h3 id="confirmTitle">Delete?</h3><p id="confirmMessage">This action cannot be undone.</p><div style="display:flex; gap:12px; justify-content:center; margin-top:20px;"><button class="btn btn-ghost" id="cancelConfirmBtn">Cancel</button><button class="btn btn-danger" id="executeConfirmBtn">Delete</button></div></div>
</div>

<div class="toast" id="toastMsgBox"><span id="toastIcon">✓</span><span id="toastText">Done</span></div>

<script>
// ======================== DATA ==========================
let categoriesData = [
  { category: "AI Tools", icon: "🤖", cls: "cat-ai", links: [{ name: "Google Gemini", url: "https://gemini.google.com/app" }, { name: "DeepSeek", url: "https://chat.deepseek.com/" }, { name: "ChatGPT", url: "https://chatgpt.com/" }, { name: "Microsoft Copilot", url: "https://copilot.microsoft.com/" }] },
  { category: "Blog Share", icon: "📝", cls: "cat-blog", links: [{ name: "Blog Post", url: "https://docs.google.com/document/d/1jpYqDiKkWELNXxqvQbGE-WYorxipZVbSn6JY_EdD0iQ/edit" }, { name: "Useful Sites", url: "https://docs.google.com/document/d/1FhCrlJSDXAT3Kv5u3JyIe7vm7mXCZI4CsFQcvyoqLYI/edit" }] },
  { category: "App Making", icon: "⚙️", cls: "cat-app", links: [{ name: "Supabase", url: "https://supabase.com/dashboard" }] },
  { category: "CS / Betting", icon: "🎰", cls: "cat-cs", links: [{ name: "3999bet", url: "https://www.3999bet00.com/" }, { name: "Babu88 Gold", url: "https://babu88.gold/" }] },
  { category: "Takabd", icon: "💰", cls: "cat-taka", links: [{ name: "Takabd Doc", url: "https://docs.google.com/document/d/1ukLdGTnLG0KghLN2UVU08sdTOk1JzTKdXuwYUA4gwjI/edit" }] },
  { category: "Dev Resources", icon: "🛠️", cls: "cat-dev", links: [{ name: "Kotlin Basics", url: "https://kotlinlang.org/" }] },
  { category: "Follow Later", icon: "🔖", cls: "cat-follow", links: [{ name: "Premium Theme", url: "https://trickbd.com/blogger/" }] }
];

// State
let currentViewFilter = "all";
let currentSearch = "";
let currentManageFilter = "all";
let editingBookmarkContext = null; // { catIdx, linkIdx }
let editingCategoryIndex = null;
let pendingDelete = null;

// Helper: domain & favicon
function getDomain(url) { try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return ""; } }
function faviconUrl(url) { return `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=48`; }
function initials(str) { return str.slice(0,2).toUpperCase(); }

// Toast
let toastTimer;
function showToast(msg, type = "success") {
  const toast = document.getElementById("toastMsgBox");
  document.getElementById("toastText").innerText = msg;
  document.getElementById("toastIcon").innerText = type === "success" ? "✓" : "⚠️";
  toast.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2800);
}

// refresh both Views
function refreshAll() {
  renderViewPage();
  if (document.getElementById("managePageContent").style.display !== "none") renderManagePage();
  updateStatsBar();
}

function updateStatsBar() {
  const totalLinks = categoriesData.reduce((s,c) => s + c.links.length, 0);
  const totalCats = categoriesData.filter(c => c.links.length > 0).length;
  document.getElementById("statsBar").innerHTML = `<div class="stat"><span class="stat-num">${totalLinks}</span><span>Bookmarks</span></div><div class="stat"><span class="stat-num">${totalCats}</span><span>Active Cats</span></div><div class="stat"><span class="stat-num">${categoriesData.find(c=>c.cls==='cat-cs')?.links.length||0}</span><span>Betting</span></div>`;
}

// ======================= VIEW PAGE =======================
function renderViewPage() {
  const container = document.getElementById("bookmarksRootView");
  container.innerHTML = "";
  let hasVisible = false;
  const filterCls = currentViewFilter;
  const search = currentSearch.trim().toLowerCase();
  
  for (let cat of categoriesData) {
    if (filterCls !== "all" && cat.cls !== filterCls) continue;
    let filteredLinks = cat.links.filter(link => !search || link.name.toLowerCase().includes(search) || getDomain(link.url).includes(search));
    if (filteredLinks.length === 0) continue;
    hasVisible = true;
    const sectionDiv = document.createElement("div");
    sectionDiv.className = `section ${cat.cls}`;
    sectionDiv.style.marginBottom = "32px";
    sectionDiv.innerHTML = `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;"><div style="font-size:1.4rem;">${cat.icon}</div><div style="font-weight:700; font-family:'Syne';">${cat.category}</div><div style="margin-left:auto; background:var(--border); padding:2px 8px; border-radius:30px; font-size:0.7rem;">${filteredLinks.length}</div></div>`;
    const gridDiv = document.createElement("div");
    gridDiv.className = "grid";
    filteredLinks.forEach(link => {
      const a = document.createElement("a");
      a.className = "bookmark-card";
      a.href = link.url; a.target = "_blank";
      a.innerHTML = `<div class="favicon"><img src="${faviconUrl(link.url)}" onerror="this.style.display='none';this.parentNode.innerHTML+='<span style=\"font-size:0.7rem;\">${initials(link.name)}</span>'"><span class="favicon-fallback" style="display:none;"></span></div><div class="card-info"><div>${link.name}</div><div style="font-size:0.7rem; color:var(--muted);">${getDomain(link.url)}</div></div><span>↗</span>`;
      gridDiv.appendChild(a);
    });
    sectionDiv.appendChild(gridDiv);
    container.appendChild(sectionDiv);
  }
  document.getElementById("noResultsView").style.display = hasVisible ? "none" : "block";
}

function buildViewFilters() {
  const row = document.getElementById("filterRowView");
  row.innerHTML = `<button class="filter-btn active" data-cat="all">✨ All</button>`;
  categoriesData.forEach(cat => {
    if(cat.links.length === 0) return;
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.innerText = `${cat.icon} ${cat.category}`;
    btn.dataset.cat = cat.cls;
    btn.onclick = () => {
      currentViewFilter = cat.cls;
      document.querySelectorAll("#filterRowView .filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderViewPage();
    };
    row.appendChild(btn);
  });
  row.firstChild.onclick = () => {
    currentViewFilter = "all";
    document.querySelectorAll("#filterRowView .filter-btn").forEach(b => b.classList.remove("active"));
    row.firstChild.classList.add("active");
    renderViewPage();
  };
}

// ======================= MANAGE PAGE =======================
function renderManagePage() {
  const root = document.getElementById("manageRootContainer");
  if (!root) return;
  root.innerHTML = "";
  let filteredCats = categoriesData.filter(cat => currentManageFilter === "all" || cat.cls === currentManageFilter);
  for (let idx = 0; idx < filteredCats.length; idx++) {
    const cat = filteredCats[idx];
    const originalIdx = categoriesData.findIndex(c => c === cat);
    const secDiv = document.createElement("div");
    secDiv.className = "manage-section";
    secDiv.innerHTML = `
      <div class="manage-section-header">
        <div class="section-icon" style="font-size:1.3rem;">${cat.icon}</div>
        <span style="font-weight:700;">${cat.category}</span>
        <span style="background:var(--border); padding:0px 8px; border-radius:20px; font-size:0.7rem;">${cat.links.length}</span>
        <div style="margin-left:auto; display:flex; gap:6px;">
          <button class="btn btn-ghost btn-sm edit-cat-trigger" data-catidx="${originalIdx}">✏️ Edit Cat</button>
          <button class="btn btn-danger btn-sm delete-cat-trigger" data-catidx="${originalIdx}">🗑️ Cat</button>
        </div>
      </div>`;
    if (cat.links.length === 0) {
      secDiv.innerHTML += `<div class="empty-cat">📭 No bookmarks yet. <button class="btn btn-ghost btn-sm add-first-bm" data-catidx="${originalIdx}">＋ Add Bookmark</button></div>`;
    } else {
      let tableHtml = `<table class="bookmark-table"><thead><tr><th style="width:40px"></th><th>Name</th><th>URL</th><th style="width:100px">Actions</th></tr></thead><tbody>`;
      cat.links.forEach((link, linkIdx) => {
        tableHtml += `<tr>
          <td><div class="favicon" style="width:26px;height:26px;"><img src="${faviconUrl(link.url)}" style="width:100%;" onerror="this.style.display='none'"><span style="font-size:0.7rem;">${initials(link.name)}</span></div></td>
          <td><strong>${escapeHtml(link.name)}</strong></td>
          <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><a href="${link.url}" target="_blank" style="color:var(--accent);">${link.url}</a></td>
          <td><div style="display:flex; gap:6px;"><button class="btn btn-ghost btn-sm edit-bm-btn" data-catidx="${originalIdx}" data-linkidx="${linkIdx}">✏️</button><button class="btn btn-danger btn-sm delete-bm-btn" data-catidx="${originalIdx}" data-linkidx="${linkIdx}">🗑️</button></div></td>
        </tr>`;
      });
      tableHtml += `</tbody></table>`;
      secDiv.innerHTML += tableHtml;
    }
    root.appendChild(secDiv);
  }
  // Attach dynamic events for manage buttons
  document.querySelectorAll(".edit-cat-trigger").forEach(btn => {
    btn.addEventListener("click", (e) => { const ci = parseInt(btn.dataset.catidx); openCategoryModalForEdit(ci); });
  });
  document.querySelectorAll(".delete-cat-trigger").forEach(btn => {
    btn.addEventListener("click", (e) => { const ci = parseInt(btn.dataset.catidx); askDeleteCategory(ci); });
  });
  document.querySelectorAll(".add-first-bm").forEach(btn => {
    btn.addEventListener("click", (e) => { const ci = parseInt(btn.dataset.catidx); openAddBookmarkModal(ci); });
  });
  document.querySelectorAll(".edit-bm-btn").forEach(btn => {
    btn.addEventListener("click", (e) => { const ci = parseInt(btn.dataset.catidx); const li = parseInt(btn.dataset.linkidx); openEditBookmarkModal(ci, li); });
  });
  document.querySelectorAll(".delete-bm-btn").forEach(btn => {
    btn.addEventListener("click", (e) => { const ci = parseInt(btn.dataset.catidx); const li = parseInt(btn.dataset.linkidx); askDeleteBookmark(ci, li); });
  });
}

function buildManageFilters() {
  const row = document.getElementById("manageFilterRow");
  row.innerHTML = `<button class="filter-btn active manage-cat-filter" data-filter="all">📌 All Categories</button>`;
  categoriesData.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn manage-cat-filter";
    btn.innerText = `${cat.icon} ${cat.category}`;
    btn.dataset.filter = cat.cls;
    btn.onclick = () => {
      currentManageFilter = cat.cls;
      document.querySelectorAll(".manage-cat-filter").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderManagePage();
    };
    row.appendChild(btn);
  });
  row.firstChild.onclick = () => {
    currentManageFilter = "all";
    document.querySelectorAll(".manage-cat-filter").forEach(b => b.classList.remove("active"));
    row.firstChild.classList.add("active");
    renderManagePage();
  };
}

// ========== BOOKMARK MODAL LOGIC ==========
let currentBookmarkCatIdx = null;
let currentBookmarkLinkIdx = null;
function openAddBookmarkModal(preferredCatIdx = null) {
  editingBookmarkContext = null;
  currentBookmarkCatIdx = null;
  currentBookmarkLinkIdx = null;
  document.getElementById("bmModalTitle").innerHTML = "Add <span style='color:var(--accent)'>Bookmark</span>";
  document.getElementById("bmName").value = "";
  document.getElementById("bmUrl").value = "";
  populateCategorySelect();
  if (preferredCatIdx !== null && categoriesData[preferredCatIdx]) {
    document.getElementById("bmCatSelect").value = preferredCatIdx;
  }
  document.getElementById("bookmarkModal").classList.add("open");
}
function openEditBookmarkModal(catIdx, linkIdx) {
  const link = categoriesData[catIdx].links[linkIdx];
  if (!link) return;
  editingBookmarkContext = { catIdx, linkIdx };
  currentBookmarkCatIdx = catIdx;
  currentBookmarkLinkIdx = linkIdx;
  document.getElementById("bmModalTitle").innerHTML = "Edit <span style='color:var(--accent)'>Bookmark</span>";
  document.getElementById("bmName").value = link.name;
  document.getElementById("bmUrl").value = link.url;
  populateCategorySelect();
  document.getElementById("bmCatSelect").value = catIdx;
  document.getElementById("bookmarkModal").classList.add("open");
}
function populateCategorySelect() {
  const sel = document.getElementById("bmCatSelect");
  sel.innerHTML = "";
  categoriesData.forEach((cat, idx) => {
    const opt = document.createElement("option");
    opt.value = idx;
    opt.textContent = `${cat.icon} ${cat.category}`;
    sel.appendChild(opt);
  });
}
function saveBookmarkHandler() {
  const name = document.getElementById("bmName").value.trim();
  let url = document.getElementById("bmUrl").value.trim();
  const targetCatIdx = parseInt(document.getElementById("bmCatSelect").value);
  if (!name) { showToast("Name required", "error"); return; }
  if (!url) { showToast("URL required", "error"); return; }
  if (!url.startsWith("http")) url = "https://" + url;
  if (editingBookmarkContext !== null) {
    // remove from old position
    const oldCat = categoriesData[editingBookmarkContext.catIdx];
    if (oldCat && oldCat.links[editingBookmarkContext.linkIdx]) {
      const movedLink = { name, url };
      oldCat.links.splice(editingBookmarkContext.linkIdx, 1);
      categoriesData[targetCatIdx].links.push(movedLink);
      showToast("Bookmark updated & moved", "success");
    } else { showToast("Error updating", "error"); }
    editingBookmarkContext = null;
  } else {
    categoriesData[targetCatIdx].links.push({ name, url });
    showToast("Bookmark added", "success");
  }
  document.getElementById("bookmarkModal").classList.remove("open");
  refreshAll();
}

// ========== CATEGORY MODAL ==========
function openCategoryModalForEdit(catIdx) {
  editingCategoryIndex = catIdx;
  const cat = categoriesData[catIdx];
  document.getElementById("catModalTitle").innerHTML = "Edit <span style='color:var(--accent)'>Category</span>";
  document.getElementById("catNameInput").value = cat.category;
  document.getElementById("catIconInput").value = cat.icon;
  document.getElementById("catClassSelect").value = cat.cls;
  document.getElementById("catModal").classList.add("open");
}
function openAddCategoryModal() {
  editingCategoryIndex = null;
  document.getElementById("catModalTitle").innerHTML = "Add <span style='color:var(--accent)'>Category</span>";
  document.getElementById("catNameInput").value = "";
  document.getElementById("catIconInput").value = "📁";
  document.getElementById("catClassSelect").value = "cat-ai";
  document.getElementById("catModal").classList.add("open");
}
function saveCategoryHandler() {
  const name = document.getElementById("catNameInput").value.trim();
  const icon = document.getElementById("catIconInput").value.trim() || "📌";
  const cls = document.getElementById("catClassSelect").value;
  if (!name) { showToast("Category name required", "error"); return; }
  if (editingCategoryIndex !== null) {
    categoriesData[editingCategoryIndex].category = name;
    categoriesData[editingCategoryIndex].icon = icon;
    categoriesData[editingCategoryIndex].cls = cls;
    showToast("Category updated", "success");
    editingCategoryIndex = null;
  } else {
    categoriesData.push({ category: name, icon, cls, links: [] });
    showToast("Category added", "success");
  }
  document.getElementById("catModal").classList.remove("open");
  refreshAll();
}

// DELETE confirmations
function askDeleteBookmark(catIdx, linkIdx) {
  const linkName = categoriesData[catIdx].links[linkIdx]?.name || "bookmark";
  pendingDelete = { type: "bookmark", catIdx, linkIdx, name: linkName };
  document.getElementById("confirmTitle").innerText = "Delete Bookmark?";
  document.getElementById("confirmMessage").innerHTML = `"${linkName}" will be removed.`;
  document.getElementById("confirmDialog").classList.add("open");
}
function askDeleteCategory(catIdx) {
  const catName = categoriesData[catIdx].category;
  pendingDelete = { type: "category", catIdx, name: catName };
  document.getElementById("confirmTitle").innerText = "Delete Category?";
  document.getElementById("confirmMessage").innerHTML = `"${catName}" and all its bookmarks will be deleted permanently.`;
  document.getElementById("confirmDialog").classList.add("open");
}
function executeDelete() {
  if (!pendingDelete) return;
  if (pendingDelete.type === "bookmark") {
    categoriesData[pendingDelete.catIdx].links.splice(pendingDelete.linkIdx, 1);
    showToast("Bookmark deleted", "success");
  } else if (pendingDelete.type === "category") {
    categoriesData.splice(pendingDelete.catIdx, 1);
    showToast("Category deleted", "success");
  }
  pendingDelete = null;
  document.getElementById("confirmDialog").classList.remove("open");
  refreshAll();
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function closeModalsOnOutsideClick() {
  document.querySelectorAll(".modal-overlay, .confirm-overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => { if(e.target === overlay) overlay.classList.remove("open"); });
  });
}

// ========== PAGE SWITCH & INIT ==========
function switchToView() {
  document.getElementById("viewPageContent").style.display = "block";
  document.getElementById("managePageContent").style.display = "none";
  document.querySelectorAll(".page-tab")[0].classList.add("active");
  document.querySelectorAll(".page-tab")[1].classList.remove("active");
  renderViewPage();
}
function switchToManage() {
  document.getElementById("viewPageContent").style.display = "none";
  document.getElementById("managePageContent").style.display = "block";
  document.querySelectorAll(".page-tab")[1].classList.add("active");
  document.querySelectorAll(".page-tab")[0].classList.remove("active");
  buildManageFilters();
  renderManagePage();
}

document.getElementById("tabViewBtn").addEventListener("click", switchToView);
document.getElementById("tabManageBtn").addEventListener("click", switchToManage);
document.getElementById("globalAddBookmarkBtn").addEventListener("click", () => openAddBookmarkModal());
document.getElementById("globalAddCatBtn").addEventListener("click", openAddCategoryModal);
document.getElementById("saveBookmarkBtn").addEventListener("click", saveBookmarkHandler);
document.getElementById("saveCatBtn").addEventListener("click", saveCategoryHandler);
document.getElementById("closeBmModalBtn").addEventListener("click", () => document.getElementById("bookmarkModal").classList.remove("open"));
document.getElementById("closeCatModalBtn").addEventListener("click", () => document.getElementById("catModal").classList.remove("open"));
document.getElementById("cancelConfirmBtn").addEventListener("click", () => document.getElementById("confirmDialog").classList.remove("open"));
document.getElementById("executeConfirmBtn").addEventListener("click", executeDelete);
document.getElementById("searchInputView").addEventListener("input", (e) => { currentSearch = e.target.value; renderViewPage(); });

// Final init
buildViewFilters();
renderViewPage();
updateStatsBar();
closeModalsOnOutsideClick();
</script>
</body>
</html>
